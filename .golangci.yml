# TauGo .golangci.yml — calque FibGo v1.64.8 ; adapté pour TauGo (cf. PRD §14).
# Configuration explicitly defined for high code quality and performance
# adhering to the request for explicit rules.

run:
  # timeout for analysis, e.g. 30s, 5m, default is 1m
  timeout: 5m
  # include test files
  tests: true
  # Target Go version matching the go directive in go.mod (not the toolchain line).
  # Required so golangci-lint v1.64.8 (built with Go 1.25) does not error when
  # go.mod carries a toolchain directive for a newer Go patch release.
  go: "1.25"

linters:
  disable-all: true
  enable:
    # Standard linters
    - gofmt # Checks if the code is formatted with gofmt
    - govet # Vet examines Go source code and reports suspicious constructs
    - errcheck # Errcheck is a program for checking for unchecked errors in go programs
    - staticcheck # Staticcheck is a go vet on steroids, applying a ton of static analysis checks
    - gosimple # Linter for Go source code that specializes in simplifying a code
    - unused # Checks Go code for unused constants, variables, functions and types
    - ineffassign # Detects when assignments to existing variables are not used
    - typecheck # Like the front-end of a Go compiler, parses and type-checks Go code

    # Style and Complexity
    - revive # Fast, configurable, extensible, flexible, and beautiful linter for Go. Drop-in replacement of golint.
    - gocyclo # Computes and checks the cyclomatic complexity of functions
    - gocognit # Computes and checks the cognitive complexity of functions
    - funlen # Tool for detection of long functions
    - whitespace # Tool for detection of leading and trailing whitespace
    - misspell # Finds commonly misspelled English words in comments

    # Performance and Bugs
    - bodyclose # checks whether HTTP response body is closed successfully
    - noctx # noctx finds sending http request without context.Context
    - prealloc # Finds slice declarations that could potentially be preallocated
    - gocritic # Provides many diagnostics that check for bugs, performance and style issues
    - unparam # Reports unused function parameters
    - unconvert # Remove unnecessary type conversions
    - nakedret # Finds naked returns in functions greater than a specified function length
    - copyloopvar # Checks for pointers to enclosing loop variables (replaced exportloopref)

    # Security
    - gosec # Inspects source code for security problems

    # Globals guard (CLAUDE.md anti-pattern #7)
    - gochecknoglobals # Checks that no global variables exist (see PRD §7.2 #7)

    # Meta
    - nolintlint # Reports ill-formed or unnecessary //nolint directives

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment # Too strict for general use, can hurt readability. Enable manually if memory is critical.
    # shadow is now ENABLED per Audit-PRD E10-R3 (Sprint S4-T3).
    # Adopted from FibGo; TauGo-specific shadowing sites (if any) will be enumerated in M1+ as packages are populated.

  gocyclo:
    min-complexity: 15 # Allow slightly complex functions (algorithms)

  gocognit:
    min-complexity: 30 # Cognitive complexity can be higher for mathematical algorithms

  funlen:
    lines: 100
    statements: 50

  revive:
    severity: warning
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters
      - name: package-comments
      - name: error-naming
      - name: error-strings
      - name: error-return
      - name: var-naming
      - name: if-return
      - name: receiver-naming
      - name: context-keys-type
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: blank-imports
      - name: context-as-argument

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - whyNoLint
      - wrapperFunc
      - hugeParam # We pass big structs sometimes

  gosec:
    excludes:
      - G104 # Duplicate of errcheck (ineffectual assignment)
      - G115 # Integer overflow casts validated — all observed n/bitLen values
             # are bounded by context (Fibonacci index limits, math/bits output
             # ranges, or explicit pre-cast checks).
             # Individual casts are reviewed in source and annotated with
             # //nosec G115 where the local bounds argument is non-obvious.

  prealloc:
    # Report preallocation suggestions only on simple loops that have no other false positives
    simple: true
    range-loops: true
    for-loops: true

  misspell:
    locale: US # Standardize on US English (or UK/Canadian if preferred, but usually US for code)
    ignore-words:
      - Probabiliste  # French regime name from τ operator spec (Monographie.md §III.8)
      - Deterministe  # French regime name from τ operator spec
      - Refus         # French regime name from τ operator spec
      - agentmeshkafka # Product name, not a misspelling
      - combinaison   # French: diagnostic string I4 guard (PRD §6.1)
      - incohérente   # French: diagnostic string I4 guard
      - détectée      # French: diagnostic string I4 guard
      - frontière     # French: diagnostic string frontier check
      - verrou        # French: diagnostic string I3 guard (ontological lock)
      - ontologique   # French: diagnostic string I3 guard

issues:
  # Excluding configuration per-path, per-linter, per-text and per-source
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - funlen
        - gosec
        - dupl
        - unparam
        - gochecknoglobals # test-scope globals (sentinel times, table fixtures) are acceptable

    # Exclude specific linter issues that are considered false positives or not relevant
    - linters:
        - staticcheck
      text: "SA1019" # Deprecation warnings (keep until ready to upgrade)

    # G304 exclusion templates (kept commented for M5+ review).
    # In FibGo, paths from flags/env are accepted as safe under a single-user CLI
    # threat model. TauGo V1 keeps G304 active to surface every file-open;
    # decisions are made case-by-case in M5 when the full threat model is reviewed.
    # - path: internal/calibration/profile\.go
    #   linters:
    #     - gosec
    #   text: "G304"
    # - path: internal/cli/output\.go
    #   linters:
    #     - gosec
    #   text: "G304"

  # Maximum issues count per one linter. Set to 0 to disable. Default is 50.
  max-issues-per-linter: 0

  # Maximum count of issues with the same text. Set to 0 to disable. Default is 3.
  max-same-issues: 0

  # Show only new issues: if there are unstaged changes or untracked files,
  # only those changes are analyzed, else only changes in HEAD~ are analyzed.
  new: false

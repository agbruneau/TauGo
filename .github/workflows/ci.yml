name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go-version: ['1.25.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      # Race detector on every OS (Windows included). The race detector
      # requires CGO; GitHub-hosted windows-latest ships a MinGW gcc, so a
      # unified step keeps coverage symmetric across platforms.
      - name: Test (race)
        env:
          CGO_ENABLED: '1'
        run: go test -race -short ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pin an exact version for reproducible verdicts (calque FibGo).
          version: v1.64.8
          args: --timeout=5m

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build

  cross-compile:
    name: Cross-compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Ensure the codebase still builds on ARM64 targets so a future port
    # to Apple Silicon or AWS Graviton is not blocked by latent amd64-only
    # code. CGO disabled -- pure-Go path is what runs on these architectures.
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux/arm64
            goos: linux
            goarch: arm64
          - target: darwin/arm64
            goos: darwin
            goarch: arm64
          - target: darwin/amd64
            goos: darwin
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Cross-compile ${{ matrix.target }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build ./...

  fuzz-smoke:
    name: Fuzz smoke (I1-I5)
    runs-on: ubuntu-latest
    # M0: no fuzz targets yet. This job is a placeholder that succeeds
    # immediately. M3 will populate internal/tau/invariants/fuzz_targets.go
    # and this job will then run `make fuzz` (30 s per cible).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fuzz smoke (no-op in M0; runs in M3+)
        run: |
          if [ -d internal/tau/invariants ] && ls internal/tau/invariants/*_test.go 2>/dev/null | grep -q fuzz; then
            go test -fuzz=. -fuzztime=30s ./internal/tau/invariants/
          else
            echo "No fuzz targets yet; this job is reserved for M3+."
          fi

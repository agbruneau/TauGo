name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      # Minimum total coverage gate. PRD §15.3: >= 80% global,
      # >= 90% on internal/tau/* (the second gate activates in M1+
      # when tau/* has substantial code; in M0 only FrontierCheck
      # is in tau/ at 100%, so a per-package gate would be noisy).
      MIN_COVERAGE: '80.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Enforce minimum coverage
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (minimum: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the ${MIN_COVERAGE}% floor"; exit 1; }

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 30

name: Coverage

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      # Minimum coverage gate, measured over the business-logic surface
      # (internal/*), excluding cmd/ which is a wiring shell.
      # PRD §15.3: >= 80% global, >= 90% on internal/tau/*.
      # In M0 only FrontierCheck is testable (cf. CHANGELOG); coverage
      # of internal/tau is 100%, and the M0 floor is computed accordingly.
      # The 90% per-package gate on tau/* activates in M1+ when more
      # code is in scope.
      MIN_COVERAGE: '80.0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests with coverage
        # -coverpkg restricts coverage measurement to business-logic packages.
        # cmd/tau is a wiring shell with no testable logic in M0; including
        # it in the denominator would mask real coverage on internal/*.
        run: go test -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/... ./...

      - name: Generate HTML coverage report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Enforce minimum coverage
        shell: bash
        run: |
          total=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}% (minimum: ${MIN_COVERAGE}%)"
          awk -v t="$total" -v m="$MIN_COVERAGE" 'BEGIN { exit (t+0 >= m+0) ? 0 : 1 }' \
            || { echo "::error::coverage ${total}% is below the ${MIN_COVERAGE}% floor"; exit 1; }

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 30
